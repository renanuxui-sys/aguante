name: Rotina Diária de Scraping

on:
  schedule:
    # GitHub Actions usa UTC. 04:35 UTC = 01:35 em São Paulo/Brasília.
    - cron: '35 4 * * *'
  workflow_dispatch:      # Permite rodar manualmente pelo GitHub

jobs:
  scraping:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
    concurrency:
      group: scraping-diario
      cancel-in-progress: false
    env:
      TZ: America/Sao_Paulo
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Instalar Chromium (para scrapers Playwright)
        run: npx playwright install chromium --with-deps

      - name: Verificar secrets obrigatórios
        run: |
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ] || [ -z "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "::error::Configure NEXT_PUBLIC_SUPABASE_URL e NEXT_PUBLIC_SUPABASE_ANON_KEY em Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: 1 — Memórias do Esporte (Brasil)
        run: node scraper-memorias.js

      - name: 2 — Memórias do Esporte (Inter e Grêmio)
        run: node scraper-memorias-inter-gremio.js

      - name: 3 — Brechó do Futebol
        run: node scraper-brecho.js

      - name: 4 — Jaiminho Camisas
        run: node scraper-jaiminho.js

      - name: 5 — Meiuka
        run: node scraper-meiuka.js

      - name: 6 — Atrox Casual Club
        run: node scraper-atrox.js

      - name: 7 — Fut Classics
        run: node scraper-futclassics.js

      - name: 8 — Brechó FC
        run: node scraper-brechofc.js

      - name: Relatório final
        if: always()
        run: |
          echo "✅ Rotina concluída em $(date)"
          echo "Scrapers executados: Memórias, Brechó do Futebol, Jaiminho, Meiuka, Atrox, Fut Classics, Brechó FC"
