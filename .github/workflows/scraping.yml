name: Rotina Diária de Scraping
run-name: Rotina Diária de Scraping (${{ github.event_name }})

on:
  schedule:
    # GitHub Actions usa UTC. 06:23 UTC = 03:23 em São Paulo/Brasília.
    - cron: '23 6 * * *'
  workflow_dispatch:

concurrency:
  group: scraping-diario
  cancel-in-progress: false

env:
  TZ: America/Sao_Paulo
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  memorias:
    name: Memórias do Esporte
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Configurar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Verificar secrets obrigatórios
        run: |
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ] || [ -z "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "::error::Configure NEXT_PUBLIC_SUPABASE_URL e NEXT_PUBLIC_SUPABASE_ANON_KEY em Settings > Secrets and variables > Actions."
            exit 1
          fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::warning::SUPABASE_SERVICE_ROLE_KEY não configurada. Scraping continua, mas histórico de preços e métricas administrativas podem depender das políticas RLS."
          fi

      - name: Memórias do Esporte (Brasil e Seleções)
        run: node scraper-memorias.js

      - name: Memórias do Esporte (Inter e Grêmio)
        run: node scraper-memorias-inter-gremio.js

  lojas-http:
    name: ${{ matrix.nome }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - nome: Brechó do Futebol
            script: scraper-brecho.js
          - nome: Jaiminho Camisas
            script: scraper-jaiminho.js
          - nome: Brechó FC
            script: scraper-brechofc.js
          - nome: Manto Sagrado
            script: scraper-mantosagrado.js
          - nome: Mundo da Bola
            script: scraper-mundodabola.js
          - nome: Copero Brechó
            script: scraper-copero.js
          - nome: Di Gordo
            script: scraper-digordo.js
          - nome: Xiru FC
            script: scraper-xirufc.js
          - nome: Rill Sports
            script: scraper-rillsports.js

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Configurar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Verificar secrets obrigatórios
        run: |
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ] || [ -z "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "::error::Configure NEXT_PUBLIC_SUPABASE_URL e NEXT_PUBLIC_SUPABASE_ANON_KEY em Settings > Secrets and variables > Actions."
            exit 1
          fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::warning::SUPABASE_SERVICE_ROLE_KEY não configurada. Scraping continua, mas histórico de preços e métricas administrativas podem depender das políticas RLS."
          fi

      - name: Executar scraper
        run: node ${{ matrix.script }}

  lojas-playwright:
    name: ${{ matrix.nome }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - nome: Atrox Casual Club
            script: scraper-atrox.js
          - nome: Fut Classics
            script: scraper-futclassics.js

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Configurar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Instalar Chromium
        run: npx playwright install chromium --with-deps

      - name: Verificar secrets obrigatórios
        run: |
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ] || [ -z "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "::error::Configure NEXT_PUBLIC_SUPABASE_URL e NEXT_PUBLIC_SUPABASE_ANON_KEY em Settings > Secrets and variables > Actions."
            exit 1
          fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::warning::SUPABASE_SERVICE_ROLE_KEY não configurada. Scraping continua, mas histórico de preços e métricas administrativas podem depender das políticas RLS."
          fi

      - name: Executar scraper
        run: node ${{ matrix.script }}

  relatorio:
    name: Relatório final
    runs-on: ubuntu-latest
    needs:
      - memorias
      - lojas-http
      - lojas-playwright
    if: always()
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Configurar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Atualizar métricas da home
        run: node atualizar-home-metricas.js

      - name: Relatório final
        run: |
          echo "✅ Rotina concluída em $(date)"
          echo "Scrapers executados em paralelo: Memórias, Brechó do Futebol, Jaiminho, Brechó FC, Fut Classics, Atrox, Manto Sagrado, Mundo da Bola, Copero Brechó, Di Gordo, Rill Sports, Xiru FC"
